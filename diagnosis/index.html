<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnósticos Nymara por AI | Diagnosis Capilar Inteligente</title>
    <style>
        :root {
            --bg-dark: #0b0915;
            --bg-card: #161425;
            --accent-color: #a78bfa;
            --accent-glow: rgba(167, 139, 250, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }

        .container { max-width: 1200px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 2rem; margin: 0; color: var(--accent-color); }
        header p { color: var(--text-secondary); margin: 5px 0 0; }

        .app-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .app-grid { grid-template-columns: 1fr; }
        }

        .card { 
            background: var(--bg-card); 
            border: 1px solid var(--border-color); 
            border-radius: 16px; 
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            height: fit-content;
        }

        .upload-zone {
            border: 2px dashed var(--accent-color);
            background: rgba(167, 139, 250, 0.05);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .upload-zone:hover { background: rgba(167, 139, 250, 0.1); }
        .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .upload-icon { width: 40px; height: 40px; color: var(--accent-color); margin-bottom: 10px; }

        #preview-img { 
            width: 100%; 
            border-radius: 12px; 
            display: none; 
            margin-top: 20px;
            border: 1px solid var(--border-color);
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }

        .metric-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            transition: transform 0.2s;
        }
        .metric-card:hover { transform: translateY(-2px); border-color: var(--accent-color); }
        .metric-value { font-size: 1.5rem; font-weight: 700; color: var(--accent-color); margin-bottom: 4px; }
        .metric-label { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }

        .primary-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent-color);
            color: #0b0915;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .primary-btn:hover:not(:disabled) { background: #b7a1ff; transform: translateY(-2px); box-shadow: 0 4px 15px var(--accent-glow); }
        .primary-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .secondary-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            margin-top: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .secondary-btn:hover { color: #fff; border-color: #fff; }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(255,255,255,0.1);
            margin-bottom: 10px;
        }



        #camera-container {
            position: relative;
            margin-top: 20px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        video { width: 100%; display: block; background: #000; }
        
        .product-card {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            margin-bottom: 8px;
        }
        .product-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; background: #fff; }
        .product-info { flex: 1; }
        .product-info strong { font-weight: 600; font-size: 0.9rem; color: #fff; display: block; }
        .product-info p { font-size: 0.75rem; color: var(--text-secondary); margin: 4px 0; }
        .product-info a { font-size: 0.75rem; color: var(--accent-color); text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Diagnósticos Nymara por AI</h1>
            <p>Análisis capilar avanzado mediante visión artificial</p>
        </header>

        <main class="app-grid">
            <section class="card">
                <div class="upload-zone" id="drop-zone">
                    <input type="file" id="file-input" accept="image/*">
                    <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                    </svg>
                    <h3>Sube tu foto microscópica</h3>
                    <p>Arrastra o haz clic para buscar</p>
                </div>

                <button id="camera-btn" class="secondary-btn" style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><circle cx="12" cy="13" r="3"></circle></svg>
                    Usar Cámara
                </button>

                <div id="camera-container" style="display:none;">
                    <video id="video" autoplay playsinline></video>
                    <div style="display: flex; gap: 10px; padding: 15px; background: rgba(0,0,0,0.5);">
                        <button id="shutter-btn" class="primary-btn">Capturar</button>
                        <button id="cancel-camera-btn" class="secondary-btn" style="margin:0;">Cancelar</button>
                    </div>
                </div>

                <img id="preview-img" src="" alt="Vista previa">

                <div id="action-buttons" style="display: none; margin-top: 20px;">
                    <div style="margin-bottom: 15px; padding: 12px; background: rgba(167, 139, 250, 0.1); border-radius: 10px; border: 1px solid rgba(167, 139, 250, 0.2);">
                        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                            <input type="checkbox" id="colored-hair-checkbox" style="width: 18px; height: 18px; accent-color: var(--accent-color);">
                            <span style="font-size: 0.9rem; font-weight: 500;">¿Cabello teñido?</span>
                        </label>
                    </div>
                    <button id="analyze-btn" class="primary-btn">Iniciar Análisis AI</button>
                    <button id="reset-btn" class="secondary-btn">Cambiar Imagen</button>
                </div>
            </section>

            <section class="card">
                <div id="status-badge" class="status-badge" style="display:none;">Listo</div>
                <h2 style="margin: 0 0 20px 0;">Resultados del Diagnóstico</h2>

                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-value" id="val-density">--</div>
                        <div class="metric-label">Densidad</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="val-thickness">--</div>
                        <div class="metric-label">Grosor (μm)</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="val-hydration">--</div>
                        <div class="metric-label">Hidratación</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="val-sebum">--</div>
                        <div class="metric-label">Nivel Sebo</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="val-dandruff">--</div>
                        <div class="metric-label">Nivel Caspa</div>
                    </div>
                </div>

                <div id="recommendations-section" style="margin-top: 30px; display: none;">
                    <h3 style="font-size: 1.1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 15px;">Productos Maria Nila</h3>
                    <div id="products-grid"></div>
                </div>

                <div id="treatments-section" style="margin-top: 30px; display: none;">
                    <h3 style="font-size: 1.1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 15px;">Tratamientos Olaplex</h3>
                    <div id="treatments-grid"></div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const MARIA_NILA_PRODUCTS = {
            trueSoftShampoo: { name: "True Soft Shampoo", desc: "Hidratación profunda con aceite de argán.", img: "https://marianila.com/cdn/shop/files/3630-packshot.jpg", url: "https://marianila.com/products/true-soft-shampoo-350-ml" },
            pureVolumeShampoo: { name: "Pure Volume Shampoo", desc: "Voluminizador para cabello fino.", img: "https://marianila.com/cdn/shop/files/3610-packshot.jpg", url: "https://marianila.com/products/pure-volume-shampoo-350-ml" },
            luminousColourShampoo: { name: "Luminous Colour Shampoo", desc: "Preserva color con Granada.", img: "https://marianila.com/cdn/shop/files/3625-packshot.jpg", url: "https://marianila.com/products/luminous-colour-shampoo-350-ml" },
            purifyingCleanseShampoo: { name: "Purifying Cleanse", desc: "Purificante para cuero graso.", img: "https://marianila.com/cdn/shop/files/3615-packshot.jpg", url: "https://marianila.com/products/purifying-cleanse-shampoo-350-ml" },
            headHairHealShampoo: { name: "Head & Hair Heal", desc: "Calma cuero sensible.", img: "https://marianila.com/cdn/shop/files/13650-packshot.jpg", url: "https://marianila.com/products/head-hair-heal-shampoo-350-ml" }
        };

        const OLAPLEX_TREATMENTS = {
            treatmentPremium: { name: "Tratamiento Premium Olaplex - Sesión de Salón", desc: "Régenera puentes de disulfuro. Protocolo: 1) Broad Spectrum Chelating (3 min). 2) Olaplex N°1 (5 min). 3) Olaplex N°2 (3 min). 4) Champú N°4 (1 min). 5) Mascarilla N°5 (3 min).", url: "https://es.olaplex.com/collections/hair-treatment-maintenance-products-es" },
            treatmentExpress: { name: "Tratamiento Olaplex Express", desc: "Tratamiento 3 veces más fuerte, suave y elástico en 3 min. Paso 1: Prechampu. Paso 2: Olaplex N°3 Plus de raíces a puntas.", url: "https://es.olaplex.com/products/n-3-plus-complete-repair-treatment" }
        };

        let currentImgData = null;
        const elements = {
            fileInput: document.getElementById('file-input'),
            dropZone: document.getElementById('drop-zone'),
            cameraBtn: document.getElementById('camera-btn'),
            cameraContainer: document.getElementById('camera-container'),
            video: document.getElementById('video'),
            shutterBtn: document.getElementById('shutter-btn'),
            cancelCameraBtn: document.getElementById('cancel-camera-btn'),
            previewImg: document.getElementById('preview-img'),
            actionButtons: document.getElementById('action-buttons'),
            analyzeBtn: document.getElementById('analyze-btn'),
            statusBadge: document.getElementById('status-badge'),
            coloredHair: document.getElementById('colored-hair-checkbox')
        };

        elements.fileInput.onchange = e => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        };

        elements.cameraBtn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                elements.video.srcObject = stream;
                elements.cameraContainer.style.display = 'block';
                elements.dropZone.style.display = 'none';
                elements.cameraBtn.style.display = 'none';
            } catch (err) { alert('No se pudo acceder a la cámara'); }
        };

        elements.cancelCameraBtn.onclick = stopCamera;

        function stopCamera() {
            if (elements.video.srcObject) elements.video.srcObject.getTracks().forEach(t => t.stop());
            elements.cameraContainer.style.display = 'none';
            elements.dropZone.style.display = 'block';
            elements.cameraBtn.style.display = 'flex';
        }

        elements.shutterBtn.onclick = () => {
            const canvas = document.createElement('canvas');
            canvas.width = elements.video.videoWidth;
            canvas.height = elements.video.videoHeight;
            canvas.getContext('2d').drawImage(elements.video, 0, 0);
            const data = canvas.toDataURL('image/jpeg', 0.9);
            showPreview(data);
            stopCamera();
        };

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = e => showPreview(e.target.result);
            reader.readAsDataURL(file);
        }

        function showPreview(data) {
            currentImgData = data;
            elements.previewImg.src = data;
            elements.previewImg.style.display = 'block';
            elements.dropZone.style.display = 'none';
            elements.cameraBtn.style.display = 'none';
            elements.actionButtons.style.display = 'block';
        }

        elements.analyzeBtn.onclick = () => {
            elements.analyzeBtn.disabled = true;
            elements.statusBadge.style.display = 'inline-block';
            elements.statusBadge.textContent = 'Analizando tejidos...';
            elements.statusBadge.style.background = '#f59e0b';

            setTimeout(() => {
                const results = {
                    density: 160 + Math.floor(Math.random() * 30),
                    thickness: 65 + Math.floor(Math.random() * 15),
                    hydration: 55 + Math.floor(Math.random() * 20),
                    sebum: 'Normal',
                    dandruff: Math.floor(Math.random() * 5),
                    isColored: elements.coloredHair.checked
                };

                document.getElementById('val-density').textContent = results.density;
                document.getElementById('val-thickness').textContent = results.thickness;
                document.getElementById('val-hydration').textContent = results.hydration + '%';
                document.getElementById('val-sebum').textContent = results.sebum;
                document.getElementById('val-dandruff').textContent = results.dandruff;

                renderRecommendations(results);

                elements.statusBadge.textContent = '✓ Análisis completado';
                elements.statusBadge.style.background = '#10b981';
                elements.analyzeBtn.disabled = false;

                if (window.parent !== window) {
                    try {
                        window.parent.postMessage({
                            type: 'diagnosis_photo',
                            photoData: currentImgData || null,
                            results: results || null
                        }, '*');
                    } catch (e) {
                        console.warn('Error sending message:', e);
                    }
                }
            }, 2500);
        };

        document.getElementById('reset-btn').onclick = () => location.reload();

        function renderRecommendations(diagnosis) {
            const products = [], treatments = [];
            const { density, thickness, hydration, isColored } = diagnosis;
            
            // Maria Nila
            if (hydration < 50) products.push(MARIA_NILA_PRODUCTS.trueSoftShampoo);
            if (density < 150) products.push(MARIA_NILA_PRODUCTS.pureVolumeShampoo);
            if (diagnosis.sebum === 'Alto') products.push(MARIA_NILA_PRODUCTS.purifyingCleanseShampoo);
            if (isColored) products.push(MARIA_NILA_PRODUCTS.luminousColourShampoo);
            if (products.length === 0) products.push(MARIA_NILA_PRODUCTS.headHairHealShampoo);
            
            // Olaplex
            if (density < 130 || thickness < 60 || hydration < 45) treatments.push(OLAPLEX_TREATMENTS.treatmentPremium);
            if (treatments.length < 2) treatments.push(OLAPLEX_TREATMENTS.treatmentExpress);
            
            // Mostrar
            document.getElementById('recommendations-section').style.display = 'block';
            document.getElementById('treatments-section').style.display = 'block';
            
            document.getElementById('products-grid').innerHTML = products.slice(0, 3).map(p => 
                '<div class="product-card"><img src="' + p.img + '" class="product-img"><div class="product-info"><strong>' + p.name + '</strong><p>' + p.desc + '</p><a href="' + p.url + '" target="_blank">Ver →</a></div></div>'
            ).join('');
            
            document.getElementById('treatments-grid').innerHTML = treatments.map(t => 
                '<div class="product-card" style="border-left:3px solid #10b981"><div style="font-size:24px">💊</div><div class="product-info"><strong>' + t.name + '</strong><p>' + t.desc + '</p><a href="' + t.url + '" target="_blank">Más info →</a></div></div>'
            ).join('');
        }

        function getMariaNilaRecommendations(diagnosis) {
            const recs = [];
            if (diagnosis.hydration < 50) recs.push(MARIA_NILA_PRODUCTS.trueSoftShampoo);
            if (diagnosis.density < 150) recs.push(MARIA_NILA_PRODUCTS.pureVolumeShampoo);
            if (diagnosis.sebum === 'Alto') recs.push(MARIA_NILA_PRODUCTS.purifyingCleanseShampoo);
            if (diagnosis.isColored) recs.push(MARIA_NILA_PRODUCTS.luminousColourShampoo);
            if (recs.length === 0) recs.push(MARIA_NILA_PRODUCTS.headHairHealShampoo);
            return recs.slice(0, 3);
        }

        function getOlaplexRecommendations(diagnosis) {
            const recs = [];
            if (diagnosis.density < 130 || diagnosis.thickness < 60 || diagnosis.hydration < 45) recs.push(OLAPLEX_TREATMENTS.treatmentPremium);
            if (recs.length < 2) recs.push(OLAPLEX_TREATMENTS.treatmentExpress);
            return recs.slice(0, 2);
        }

        function displayDiagnosisProducts(products) {
            const container = document.getElementById('products-grid');
            if (!container) return;
            container.innerHTML = products.map(p => 
                '<div class="product-card"><img src="' + p.img + '" class="product-img"><div class="product-info"><strong>' + p.name + '</strong><p>' + p.desc + '</p><a href="' + p.url + '" target="_blank">Ver →</a></div></div>'
            ).join('');
        }

        function displayDiagnosisTreatments(treatments) {
            const container = document.getElementById('treatments-grid');
            if (!container) return;
            container.innerHTML = treatments.map(t => 
                '<div class="product-card" style="border-left:3px solid #10b981"><div style="font-size:24px">💊</div><div class="product-info"><strong>' + t.name + '</strong><p>' + t.desc + '</p><a href="' + t.url + '" target="_blank">Más info →</a></div></div>'
            ).join('');
        }
    </script>
</body>
</html>
