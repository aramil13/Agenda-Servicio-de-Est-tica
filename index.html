<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Estética | Panel de Control</title>
    <meta name="description" content="Sistema de gestión y agenda para servicios de estética.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ════════════════════════════════════
         AUTH SCREEN (shown when logged out)
         ════════════════════════════════════ -->
    <div class="auth-screen" id="auth-screen">
        <div class="auth-bg-shapes">
            <div class="auth-shape auth-shape-1"></div>
            <div class="auth-shape auth-shape-2"></div>
            <div class="auth-shape auth-shape-3"></div>
        </div>
        <div class="auth-container">
            <div class="auth-brand">
                <div class="brand-icon">✨</div>
                <h1>Nymara <span class="highlight">Estilistas</span></h1>
                <p>Sistema de gestión y agenda profesional</p>
            </div>

            <!-- Login Form -->
            <form class="auth-form" id="auth-login-form">
                <h2 id="auth-form-title">Iniciar Sesión</h2>
                <p class="auth-subtitle" id="auth-form-subtitle">Accede a tu panel de control</p>

                <div id="auth-error" class="auth-error" style="display:none"></div>

                <!-- Campos ocultos para engañar al autocompletado del navegador -->
                <input type="text" name="fakeemail" style="display:none" aria-hidden="true">
                <input type="password" name="fakepassword" style="display:none" aria-hidden="true">

                <div class="form-group">
                    <label for="auth-email">Correo electrónico</label>
                    <div class="auth-input-wrapper">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"></path></svg>
                        <input type="email" class="form-control auth-input" id="auth-email" name="email_field_nocache" required placeholder="tu@email.com" autocomplete="off" value="" readonly>
                    </div>
                </div>

                <div class="form-group" id="auth-password-group">
                    <label for="auth-password">Contraseña</label>
                    <div class="auth-input-wrapper">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        <input type="password" class="form-control auth-input" id="auth-password" name="password_field_nocache" required placeholder="••••••••" autocomplete="new-password" minlength="6" value="" readonly>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary auth-submit" id="auth-submit-btn">
                    <span id="auth-submit-text">Entrar</span>
                    <div class="auth-spinner" id="auth-spinner" style="display:none"></div>
                </button>

            </form>
        </div>
    </div>

    <!-- ════════════════════════════════════
         APP (shown when logged in)
         ════════════════════════════════════ -->
    <div class="app-layout" id="app-layout" style="display:none">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-icon">✨</div>
                <h1>Nymara <span class="highlight">Estilistas</span></h1>
            </div>
            <nav class="nav-menu">
                <button class="nav-item active" data-target="agenda">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <span>Agenda</span>
                </button>
                <button class="nav-item" data-target="clients">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <span>Clientes</span>
                </button>
                <button class="nav-item" data-target="services">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>
                    <span>Servicios</span>
                </button>
                <button class="nav-item" data-target="monthly">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                    <span>Listado Mensual</span>
                </button>
                <button class="nav-item" data-target="whatsapp">
                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-.745-.386-1.203.016-.454.397-.905.895-1.351 1.358-.448.463-.901.445-1.503.099-.603-.346-1.175-.537-2.003-.537-.828 0-1.4.191-2.003.537-.603.346-.951.367-1.503-.099-.446-.463-.9-.961-1.351-1.358-.458-.402-.907-.165-1.203-.016-.297.149-.503.297-.755.447-.253.149-.502-.099-.755-.149-.252-.05-.502.199-.602.447-.1.248-.1.596-.05.745.05.149.199.298.398.398.199.099.497.248.755.497.258.249.547.547.806.746.259.199.458.348.657.447.199.099.397.049.597-.05.199-.099.348-.148.547-.248.199-.099.348-.05.497.05.149.099.298.248.497.397.199.15.497.348.905.547m4.59-1.503c-.249-.597-.547-1.198-1.045-1.696-.497-.497-1.098-.796-1.695-1.044-.597-.248-1.247-.149-1.795.1-.547.248-.945.547-1.295.945-.348.397-.597.895-.647 1.344-.05.447.05.795.397 1.195.348.398.745.696 1.145.994.398.298.845.497 1.295.547.448.05.895-.099 1.344-.298.447-.199.796-.497 1.045-.895.248-.398.397-.896.447-1.394.05-.497-.1-.995-.348-1.493m-5.424-9.855l-.547.249c-1.195.547-2.142 1.293-3.091 2.192-.945.896-1.593 1.893-2.092 2.992-.497 1.096-.646 2.193-.348 3.24.299 1.046.996 2.043 2.092 2.64.448.248.846.298 1.244.199.398-.099.796-.398 1.095-.846.298-.448.497-.945.646-1.493.149-.547.149-1.145.099-1.744-.049-.596-.348-1.145-.696-1.593-.348-.447-.796-.795-1.295-1.094-.497-.298-1.045-.497-1.592-.647-.547-.149-1.095-.149-1.643-.05-.547.1-1.095.447-1.493.995-.397.547-.547 1.195-.447 1.893.099.696.447 1.344.995 1.942l.398.597c.348.547.746 1.046 1.194 1.444.447.397.945.795 1.493 1.044.547.248 1.144.298 1.742.099.597-.199 1.144-.597 1.542-1.145.397-.547.746-1.145.995-1.792.248-.646.397-1.393.397-2.092-.05-.696-.348-1.393-.846-1.991-.497-.596-1.194-1.044-1.94-1.443-.746-.398-1.592-.547-2.538-.447-.946.1-1.742.547-2.39 1.294-.646.746-.945 1.692-.895 2.639.049.945.547 1.841 1.443 2.49.895.646 1.99.895 3.09.745 1.095-.149 2.043-.745 2.737-1.64.697-.896 1.046-1.992 1.046-3.14 0-1.144-.397-2.29-1.144-3.186-.746-.896-1.742-1.543-2.886-1.941-1.145-.397-2.29-.397-3.386-.099-1.095.298-2.092.995-2.837 1.991-.746.995-1.195 2.191-1.295 3.437-.099 1.245.149 2.44.845 3.536.696 1.095 1.742 1.891 3.04 2.339 1.295.447 2.589.397 3.834-.149 1.244-.547 2.241-1.592 2.836-2.887.596-1.295.796-2.688.597-4.03"></path></svg>
                    <span>Recordatorios</span>
                </button>
            </nav>
            <!-- User Profile & Logout -->
            <div class="sidebar-footer" id="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar" id="user-avatar">U</div>
                    <div class="user-info">
                        <span class="user-email" id="user-email">usuario@email.com</span>
                        <span class="user-role">Administrador</span>
                    </div>
                </div>
                <button class="btn-logout" id="btn-logout" title="Cerrar sesión">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content" id="app-content">
            <!-- Dynamic Content Injected Here -->
        </main>
    </div>

    <!-- Reusable Modal (Hidden by default) -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-container" id="modal-container">
            <div class="modal-header">
                <h2 id="modal-title">Título Modal</h2>
                <button class="btn-close" id="btn-close-modal">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Modal content goes here -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="main.js"></script>
</body>
</html>
