<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Test Toggle Buttons</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .auth-toggle { display: flex; gap: 4px; margin: 20px 0; }
        .auth-toggle-btn { 
            padding: 10px 20px; 
            border: 2px solid #ccc; 
            background: white; 
            cursor: pointer;
            font-size: 16px;
        }
        .auth-toggle-btn.active { 
            background: #8b5cf6; 
            color: white; 
            border-color: #8b5cf6; 
        }
    </style>
</head>
<body>
    <h1>Test Toggle Buttons</h1>
    
    <div class="auth-toggle">
        <button type="button" class="auth-toggle-btn active" data-type="admin">Administrador</button>
        <button type="button" class="auth-toggle-btn" data-type="staff">Staff</button>
    </div>
    
    <div id="result">Click a button...</div>
    
    <script>
        console.log('Script loaded');
        
        const authToggleBtns = document.querySelectorAll('.auth-toggle-btn');
        console.log('Buttons found:', authToggleBtns.length);
        
        authToggleBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                console.log('Clicked:', btn.dataset.type);
                
                authToggleBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                document.getElementById('result').textContent = 'Selected: ' + btn.dataset.type;
            });
        });
    </script>
</body>
</html>
